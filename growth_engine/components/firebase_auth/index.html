<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Streamlit Firebase Auth Component</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        background: transparent;
        padding-top: 15px;
      }
      .google-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        color: #3c4043;
        padding: 10px 18px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        transition: box-shadow 0.2s, background-color 0.2s;
      }
      .google-btn:hover {
        background-color: #f8f9fa;
        box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      }
      .google-btn img {
        width: 18px;
        height: 18px;
        margin-right: 12px;
      }
      #msg {
        margin-top: 16px;
        font-size: 14px;
        color: #5f6b7a;
      }
    </style>
  </head>
  <body>
    <button id="btn" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
      Sign in with Google
    </button>
    <p id="msg"></p>

    <script>
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      let authListenerAttached = false;
      let lastReportedUserKey = "";
      let lastProcessedLogoutVersion = 0;
      let currentShowLoginButton = true;

      function sendMessageToStreamlitClient(type, data) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: type,
            ...data,
          },
          "*"
        );
      }

      function setComponentValue(value) {
        sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
      }

      function setFrameHeight(height) {
        sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
      }

      function updateFrameHeight() {
        const hasMessage = Boolean(msg.innerText);
        if (!currentShowLoginButton && !hasMessage) {
          setFrameHeight(16);
          return;
        }
        setFrameHeight(hasMessage ? 140 : 120);
      }

      function reportError(message) {
        msg.innerText = message;
        setComponentValue({ status: "error", message: message });
        updateFrameHeight();
      }

      function reportSignedOut() {
        lastReportedUserKey = "";
        setComponentValue({ status: "signed_out" });
      }

      function reportAuthenticated(user) {
        user
          .getIdToken()
          .then((token) => {
            const email = user.email || "";
            const userKey = [user.uid || "", email, token].join("|");
            if (userKey === lastReportedUserKey) {
              return;
            }
            lastReportedUserKey = userKey;
            setComponentValue({
              status: "authenticated",
              email: email,
              token: token,
              uid: user.uid || "",
              displayName: user.displayName || "",
            });
          })
          .catch((err) => {
            reportError("Failed to restore the login session: " + err.message);
          });
      }

      function ensureFirebase(firebaseConfig) {
        if (firebase.apps.length) {
          return true;
        }
        if (
          !firebaseConfig ||
          !firebaseConfig.apiKey ||
          !firebaseConfig.authDomain ||
          !firebaseConfig.projectId
        ) {
          reportError("Firebase configuration is missing.");
          return false;
        }

        firebase.initializeApp(firebaseConfig);
        firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch((err) => {
          reportError("Failed to enable session persistence: " + err.message);
        });
        return true;
      }

      function ensureAuthListener() {
        if (authListenerAttached || !firebase.apps.length) {
          return;
        }

        authListenerAttached = true;
        firebase.auth().onAuthStateChanged((user) => {
          if (user) {
            msg.innerText = "";
            reportAuthenticated(user);
          } else if (lastReportedUserKey || lastProcessedLogoutVersion > 0) {
            msg.innerText = "";
            reportSignedOut();
          } else {
            msg.innerText = "";
          }
          updateFrameHeight();
        });
      }

      function applyRenderArgs(args) {
        currentShowLoginButton = Boolean(args.showLoginButton);
        btn.style.display = currentShowLoginButton ? "inline-flex" : "none";

        if (!ensureFirebase(args.firebaseConfig)) {
          return;
        }

        ensureAuthListener();

        if (
          typeof args.logoutVersion === "number" &&
          args.logoutVersion > 0 &&
          args.logoutVersion !== lastProcessedLogoutVersion
        ) {
          lastProcessedLogoutVersion = args.logoutVersion;
          msg.innerText = "Signing out...";
          updateFrameHeight();
          firebase
            .auth()
            .signOut()
            .catch((err) => {
              reportError("Failed to sign out: " + err.message);
            });
          return;
        }

        updateFrameHeight();
      }

      window.addEventListener("message", function (event) {
        if (event.data.type === "streamlit:render") {
          applyRenderArgs(event.data.args || {});
        }
      });

      sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });

      btn.onclick = function () {
        if (!firebase.apps.length) {
          reportError("Firebase configuration is missing.");
          return;
        }

        msg.innerText = "";
        updateFrameHeight();
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase
          .auth()
          .setPersistence(firebase.auth.Auth.Persistence.LOCAL)
          .then(() => firebase.auth().signInWithPopup(provider))
          .then(() => {
            msg.innerText = "";
            updateFrameHeight();
          })
          .catch((err) => {
            reportError("Error: " + err.message);
          });
      };
    </script>
  </body>
</html>
