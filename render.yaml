services:
  - type: web
    name: hackindia-lead-finder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: USE_BROWSER_FALLBACK
        value: "false"
      - key: WEBSITE_PRECHECK_REQUIRED
        value: "true"
      - key: SMTP_PRECHECK_REQUIRED
        value: "true"
      - key: RESULTS_DIR
        value: output
      - key: SMTP_FROM_EMAIL
        sync: false
