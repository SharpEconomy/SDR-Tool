<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Streamlit Firebase Auth Component</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        background: transparent;
        padding-top: 15px;
      }
      .google-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        color: #3c4043;
        padding: 10px 18px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        transition: box-shadow 0.2s, background-color 0.2s;
      }
      .google-btn:hover {
        background-color: #f8f9fa;
        box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
      }
      .google-btn img {
        width: 18px;
        height: 18px;
        margin-right: 12px;
      }
      #msg {
        margin-top: 16px;
        font-size: 14px;
        color: #5f6b7a;
      }
    </style>
  </head>
  <body>
    <button id="btn" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
      Sign in with Google
    </button>
    <p id="msg"></p>

    <script>
      function sendMessageToStreamlitClient(type, data) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: type,
          ...data
        }, "*");
      }

      function setComponentValue(value) {
        sendMessageToStreamlitClient("streamlit:setComponentValue", {value: value});
      }

      function setFrameHeight(height) {
        sendMessageToStreamlitClient("streamlit:setFrameHeight", {height: height});
      }

      // Handle messages from the Streamlit framework
      window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
          const args = event.data.args;
          if (args && args.firebaseConfig && !firebase.apps.length) {
            firebase.initializeApp(args.firebaseConfig);
          }
          setFrameHeight(120);
        }
      });

      // Tell Streamlit the component is ready
      sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});

      // Handle the button click
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      
      btn.onclick = function() {
         if (!firebase.apps.length) {
             msg.innerText = "Firebase configuration is missing.";
             setFrameHeight(120);
             return;
         }
         
         const provider = new firebase.auth.GoogleAuthProvider();
         firebase.auth().signInWithPopup(provider)
           .then(res => {
              const email = res.user.email;
              msg.innerText = "Logged in: " + email;
              res.user.getIdToken().then(token => {
                  setComponentValue({ email: email, token: token });
              }).catch(err => {
                  msg.innerText = "Failed to get token: " + err.message;
              });
              setFrameHeight(120);
           })
           .catch(err => {
              msg.innerText = "Error: " + err.message;
              setFrameHeight(140);
           });
      };
    </script>
  </body>
</html>
